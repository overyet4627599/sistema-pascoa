<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Entregas - Páscoa</title>
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; background:#fff8f0; margin:0; padding:0; }
    header { background: linear-gradient(135deg, #ff9a9e, #fecfef); color:#6b4226; padding:20px; text-align:center; font-size:24px; font-weight:bold; }
    nav { background:#ffe6f0; padding:10px; text-align:center; }
    nav a { margin:0 15px; color:#6b4226; font-weight:bold; text-decoration:none; }
    nav a:hover { text-decoration:underline; }
    .container { padding:20px; }
    .rota { margin-bottom:30px; }
    .rota h2 { background:#ffdde1; padding:10px; border-radius:8px; color:#6b4226; }
    .resumo { font-weight:bold; color:#333; margin:8px 0; }
    .pedido { background:#fff; border:2px dashed #ff9a9e; border-radius:8px; padding:10px; margin:10px 0; }
    .pedido strong { color:#6b4226; }
  </style>
</head>
<body>

<header>🚚 Entregas Organizadas por Local</header>

<nav>
  <a href="dashboard.html">📋 Dashboard</a>
  <a href="index.html">➕ Novo Pedido</a>
  <a href="entregas.html">🚚 Entregas</a>
  <a href="login.html">🔑 Sair</a>
</nav>

<div class="container" id="lista-entregas"></div>

<script>
  async function carregarEntregas() {
    const r = await fetch("/pedidos");
    const pedidos = await r.json();

    // Agrupar por rota/local
    const agrupados = {};
    pedidos.forEach(p => {
      if (!agrupados[p.rota]) agrupados[p.rota] = [];
      agrupados[p.rota].push(p);
    });

    const lista = document.getElementById("lista-entregas");
    lista.innerHTML = "";

    Object.keys(agrupados).forEach(rota => {
      const divRota = document.createElement("div");
      divRota.className = "rota";

      // calcular resumo
      const totalPedidos = agrupados[rota].length;
      let valorTotal = 0;
      agrupados[rota].forEach(p => {
        p.itens.forEach(i => {
          valorTotal += parseFloat(i.valor);
        });
      });

      divRota.innerHTML = `
        <h2>📍 ${rota}</h2>
        <p class="resumo">Total de pedidos: ${totalPedidos} | Valor total: R$${valorTotal.toFixed(2)}</p>
      `;

      agrupados[rota].forEach(p => {
        const itensHTML = p.itens.map(i =>
          `${(i.sabores ? i.sabores.join(" + ") : i.sabor)} (${i.tamanho}, ${i.casca}) - R$${i.valor}`
        ).join("<br>");

        const divPedido = document.createElement("div");
        divPedido.className = "pedido";
        divPedido.innerHTML = `
          <strong>Cliente:</strong> ${p.cliente}<br>
          <strong>Entrega:</strong> ${p.dataentrega}<br>
          <strong>Itens:</strong><br>${itensHTML}
        `;
        divRota.appendChild(divPedido);
      });

      lista.appendChild(divRota);
    });
  }

  carregarEntregas();
</script>

</body>
</html>
